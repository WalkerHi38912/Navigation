<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NKE.team — Навигация</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 20px;
  }

  .header-logo {
    font-size: 18px;
    font-weight: 700;
    color: #2563eb;
    letter-spacing: -0.3px;
  }

  .content {
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  @media (min-width: 600px) {
    .content {
      padding: 32px 24px;
      gap: 40px;
    }
  }

  .floor-card {
    width: 100%;
    max-width: 860px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
  }

  .floor-label {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f2f5;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fafafa;
  }

  .floor-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: #2563eb;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .floor-img {
    width: 100%;
    display: block;
    object-fit: contain;
    background: #fff;
  }
</style>
</head>
<body>

<header class="header">
  <span class="header-logo">NKE.team</span>
</header>

<main class="content">

  <div class="floor-card">
    <div class="floor-label"><span class="floor-badge">1</span> 1 этаж</div>
    <img class="floor-img" src="/1.PNG" alt="План 1 этажа">
  </div>

  <div class="floor-card">
    <div class="floor-label"><span class="floor-badge">2</span> 2 этаж</div>
    <img class="floor-img" src="/2.PNG" alt="План 2 этажа">
  </div>

  <div class="floor-card">
    <div class="floor-label"><span class="floor-badge">3</span> 3 этаж</div>
    <img class="floor-img" src="/3.PNG" alt="План 3 этажа">
  </div>

  <div class="floor-card">
    <div class="floor-label"><span class="floor-badge">4</span> 4 этаж</div>
    <img class="floor-img" src="/4.PNG" alt="План 4 этажа">
  </div>

  <div class="floor-card">
    <div class="floor-label"><span class="floor-badge">5</span> 5 этаж</div>
    <img class="floor-img" src="/5.PNG" alt="План 5 этажа">
  </div>

</main>

</body>
</html>
